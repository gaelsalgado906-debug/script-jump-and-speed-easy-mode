<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading, Continue & Key Success</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chewy&display=swap" rel="stylesheet">

    <style>
        .font-chewy {
            font-family: 'Chewy', system-ui, sans-serif;
        }

        /* --- ANIMACIONES MODERNAS PERSONALIZADAS --- */
        
        /* Nueva: Animación lenta y suave para la entrada inicial de la página */
        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.95); filter: blur(4px); }
            100% { opacity: 1; transform: scale(1); filter: blur(0); }
        }
        .animate-fade-in-initial {
            animation: fadeInScale 1.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        /* 1. Efecto de brillo y pulso para el Loading */
        @keyframes modernPulse {
            0%, 100% { transform: scale(1); opacity: 0.9; filter: drop-shadow(0 0 10px rgba(192, 132, 252, 0.4)); }
            50% { transform: scale(1.03); opacity: 1; filter: drop-shadow(0 0 25px rgba(236, 72, 153, 0.7)); }
        }
        .animate-modern-loading {
            animation: modernPulse 2.5s infinite ease-in-out;
        }

        /* 2. Degradado animado fluido para "Continuar" */
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .animate-gradient-text {
            background-size: 200% auto;
            animation: gradientMove 4s linear infinite;
        }

        /* 3. Entrada sutil estilo Pop para la sección final */
        @keyframes softPop {
            0% { transform: scale(0.92); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-soft-pop {
            animation: softPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
    </style>
</head>
<body class="bg-slate-950 min-h-screen flex flex-col items-center justify-center text-white font-sans antialiased selection:bg-fuchsia-500/30 overflow-hidden">

    <div id="loading-screen" class="w-full max-w-md p-8 text-center space-y-6 transition-all duration-700 opacity-0 transform scale-95 animate-fade-in-initial">
        <h1 id="loading-title" class="font-chewy text-4xl md:text-5xl tracking-wider min-h-[60px] text-transparent bg-clip-text bg-gradient-to-r from-pink-400 via-purple-400 to-indigo-400 animate-modern-loading">
            loading.
        </h1>

        <div class="relative w-full h-4 bg-slate-800/80 rounded-full p-[3px] shadow-inner backdrop-blur-sm border border-slate-700/50">
            <div id="progress-bar" 
                 class="h-full w-0 rounded-full bg-gradient-to-r from-pink-500 via-purple-500 to-indigo-500 shadow-[0_0_15px_rgba(168,85,247,0.5)] transition-all duration-100 ease-out">
            </div>
        </div>

        <p id="progress-text" class="text-sm font-medium text-slate-400 tracking-widest font-mono">
            0%
        </p>
    </div>

    <div id="continue-screen" class="hidden w-full max-w-md p-8 text-center space-y-8 transition-all duration-700 opacity-0 transform scale-95">
        <h2 class="font-chewy text-5xl md:text-6xl text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 via-cyan-300 to-emerald-400 tracking-wide drop-shadow-lg animate-gradient-text">
            Continuar
        </h2>
        <div class="pt-4">
            <button id="go-btn" class="font-chewy text-3xl px-14 py-3 bg-gradient-to-r from-pink-500 via-purple-500 to-indigo-500 rounded-2xl shadow-[0_0_20px_rgba(168,85,247,0.4)] hover:shadow-[0_0_35px_rgba(236,72,153,0.6)] hover:scale-105 active:scale-95 transition-all duration-300 tracking-widest cursor-pointer text-white uppercase">
                GO
            </button>
        </div>
    </div>

    <div id="key-screen" class="hidden w-full max-w-lg p-8 text-center space-y-6 transition-all duration-700 opacity-0 transform scale-95">
        <div class="space-y-4">
            <p id="key-title" class="font-chewy text-3xl md:text-4xl text-purple-300 tracking-wide">
                Key Successful :
            </p>
            <div class="bg-slate-900/90 border border-slate-800 rounded-xl p-5 font-mono text-base md:text-lg text-pink-400 tracking-wider break-all shadow-inner select-all">
                qw0-099827k838h8HH9GF838
            </div>
        </div>
    </div>

    <script>
        const loadingScreen = document.getElementById('loading-screen');
        const continueScreen = document.getElementById('continue-screen');
        const keyScreen = document.getElementById('key-screen');
        
        const titleElement = document.getElementById('loading-title');
        const progressBar = document.getElementById('progress-bar');
        const progressText = document.getElementById('progress-text');
        const goBtn = document.getElementById('go-btn');
        const keyTitle = document.getElementById('key-title');

        // Animación de los puntos (. .. ...)
        const titles = ['loading.', 'loading..', 'loading...'];
        let titleIndex = 0;
        const titleInterval = setInterval(() => {
            titleElement.innerText = titles[titleIndex];
            titleIndex = (titleIndex + 1) % titles.length;
        }, 600);

        // Control del progreso a 9 segundos uniformes
        let progress = 0;
        const totalTime = 9000; 
        const intervalTime = 90; 
        const increment = 100 / (totalTime / intervalTime); 

        // Retardamos levemente el inicio del contador para sincronizarlo con la animación de entrada suave
        setTimeout(() => {
            const progressInterval = setInterval(() => {
                progress += increment;
                
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(progressInterval);
                    clearInterval(titleInterval);
                    
                    progressBar.style.width = '100%';
                    progressText.innerText = '100%';
                    
                    switchScreens(loadingScreen, continueScreen);
                } else {
                    progressBar.style.width = `${Math.floor(progress)}%`;
                    progressText.innerText = `${Math.floor(progress)}%`;
                }
            }, intervalTime);
        }, 400);

        // Evento Click para el botón GO
        goBtn.addEventListener('click', () => {
            switchScreens(continueScreen, keyScreen);
            keyTitle.classList.add('animate-soft-pop');
        });

        // Manejador de transición de pantallas
        function switchScreens(currentScreen, nextScreen) {
            currentScreen.classList.remove('opacity-100', 'scale-100', 'animate-fade-in-initial');
            currentScreen.classList.add('opacity-0', 'scale-95');

            setTimeout(() => {
                currentScreen.classList.add('hidden');
                nextScreen.classList.remove('hidden');
                
                setTimeout(() => {
                    nextScreen.classList.remove('opacity-0', 'scale-95');
                    nextScreen.classList.add('opacity-100', 'scale-100');
                }, 50);
            }, 700); 
        }
    </script>

</body>
</html>
